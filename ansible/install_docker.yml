---
- name: Install Docker on Jenkins slaves
  hosts: jenkins_slaves
  become: yes
  tasks:
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Add Docker GPG apt key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name: 
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create jenkins user for the agent
      user:
        name: jenkins
        shell: /bin/bash
        groups: docker
        append: yes

    - name: Add jenkins to sudoers
      lineinfile:
        path: /etc/sudoers.d/jenkins
        line: "jenkins ALL=(ALL) NOPASSWD:ALL"
        state: present
        mode: 0440
        create: yes
        validate: 'visudo -cf %s'

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes