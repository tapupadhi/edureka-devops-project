version: '3.8'

services:
  app-test:
    build: .
    container_name: fastapi-test
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  app-prod:
    build: .
    container_name: fastapi-prod
    ports:
      - "80:8000"
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  tests:
    build: .
    volumes:
      - ./app:/app/app
      - ./test-results:/app/test-results
    environment:
      - PYTHONPATH=/app
    command: >
      sh -c "pytest app/test_main.py -v --cov=app --cov-report=xml:/app/test-results/coverage.xml --junitxml=/app/test-results/junit.xml"
    depends_on:
      - app-test