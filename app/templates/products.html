<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>AppleBite Store</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/products">Products</a></li>
                    <li><a href="/api">API</a></li>
                    <li><a href="#" id="cart-icon"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="products-section">
        <div class="container">
            <h2>All Products</h2>
            
            <div class="filters">
                <div class="filter-group">
                    <label for="category-filter">Category:</label>
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        <option value="Smartphones">Smartphones</option>
                        <option value="Laptops">Laptops</option>
                        <option value="Tablets">Tablets</option>
                        <option value="Wearables">Wearables</option>
                        <option value="Audio">Audio</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="price-filter">Max Price:</label>
                    <input type="range" id="price-filter" min="0" max="3000" step="100" value="3000">
                    <span id="price-display">$3000</span>
                </div>
                
                <div class="search-group">
                    <input type="text" id="search-input" placeholder="Search products...">
                    <button id="search-button"><i class="fas fa-search"></i></button>
                </div>
            </div>
            
            <div class="product-grid" id="products-container">
                <!-- Products will be loaded here by JavaScript -->
                <div class="loading">Loading products...</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2025 AppleBite Co. All rights reserved.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', path='/js/products.js') }}"></script>
</body>
</html>
